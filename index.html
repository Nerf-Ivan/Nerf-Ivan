<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ivan Swanepoel - Redirecting...</title>
    <!-- Meta redirect (fallback) -->
    <meta http-equiv="refresh" content="5;url=https://ivan-personal-website.onrender.com">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #1e272e;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
            border-radius: 10px;
            background-color: #34495e;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 10;
        }
        
        h1 {
            font-size: 2.5rem;
            color: #3498db;
            margin-bottom: 1.5rem;
        }
        
        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .loader {
            width: 100%;
            height: 6px;
            background-color: #2c3e50;
            border-radius: 3px;
            margin-bottom: 2rem;
            overflow: hidden;
        }
        
        .loader-bar {
            height: 100%;
            width: 0;
            background-color: #3498db;
            animation: loading 5s linear forwards;
        }
        
        .redirect-button {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .redirect-button:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }
        
        .social-links {
            margin-top: 2rem;
        }
        
        .social-links a {
            color: white;
            font-size: 1.5rem;
            margin: 0 10px;
            transition: color 0.3s;
        }
        
        .social-links a:hover {
            color: #3498db;
        }
        
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        @keyframes loading {
            0% { width: 0; }
            100% { width: 100%; }
        }
        
    </style>
    <!-- Boxicons CDN Link -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <h1>Ivan Swanepoel</h1>
        <p>Thanks for visiting! I've moved my website to a new location. You'll be redirected automatically in a few seconds.</p>
        
        <div class="loader">
            <div class="loader-bar"></div>
        </div>
        
        <a href="https://your-new-website-url.com" class="redirect-button">Go to my website now</a>
        
        <div class="social-links">
            <a href="https://github.com/Nerf-Ivan" target="_blank"><i class='bx bxl-github'></i></a>
            <a href="https://www.instagram.com/ivan._.swanepoel" target="_blank"><i class='bx bxl-instagram'></i></a>
            <a href="https://www.facebook.com/ivan._.swanepoel" target="_blank"><i class='bx bxl-facebook'></i></a>
        </div>
    </div>

    <script>
        // JavaScript redirect (preferred method)
        setTimeout(function() {
            window.location.href = "https://ivan-personal-website.onrender.com";
        }, 5000);
        
        // Simple particle animation
        document.addEventListener("DOMContentLoaded", function() {
            const particlesContainer = document.getElementById("particles");
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement("div");
                particle.style.position = "absolute";
                particle.style.width = Math.random() * 3 + 1 + "px";
                particle.style.height = particle.style.width;
                particle.style.backgroundColor = "rgba(52, 152, 219, 0.4)";
                particle.style.borderRadius = "50%";
                particle.style.top = Math.random() * 100 + "%";
                particle.style.left = Math.random() * 100 + "%";
                particle.style.animation = `float ${Math.random() * 15 + 5}s infinite linear`;
                
                const keyframes = `
                    @keyframes float {
                        0% { transform: translate(0, 0) rotate(0deg); opacity: ${Math.random() * 0.5 + 0.1}; }
                        50% { transform: translate(${Math.random() * 100 - 50}px, ${Math.random() * 100 - 50}px) rotate(180deg); opacity: ${Math.random() * 0.5 + 0.3}; }
                        100% { transform: translate(0, 0) rotate(360deg); opacity: ${Math.random() * 0.5 + 0.1}; }
                    }
                `;
                
                const style = document.createElement("style");
                style.innerHTML = keyframes;
                document.head.appendChild(style);
                
                particlesContainer.appendChild(particle);
            }
        });
    </script>
</body>
</html>
