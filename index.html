<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to right, #4facfe, #00f2fe);
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
      text-align: center;
      animation: fadeIn 1s ease forwards;
    }

    .card h1 {
      font-size: 2em;
      margin-bottom: 10px;
      color: #333;
    }

    .card p {
      font-size: 1.1em;
      color: #555;
      margin-bottom: 20px;
    }

    .card button {
      padding: 12px 24px;
      font-size: 1em;
      background-color: #4facfe;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .card button:hover {
      background-color: #00c3ff;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Welcome to My Website</h1>
    <p>Your journey into my projects begins here!</p>
    <button onclick="redirectUser()">Enter</button>
  </div>

  <script>
    function redirectUser() {
      // Change this link to your desired destination:
      window.location.href = "https://ivan-personal-website.onrender.com";
    }
  </script>

</body>
</html>
